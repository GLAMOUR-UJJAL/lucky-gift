<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Lucky Gift!</title>
    <style>
        /* CUSTOMIZE YOUR LOOK HERE */
        html, body {
            overflow: hidden; /* Hard block on mobile pull-to-refresh scrolling */
            height: 100%;
            margin: 0;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #1a1a1a; /* Dark sleek background */
            color: #fff;
            padding: 50px 20px; 
            /* Prevents pull-to-refresh gesture on chrome/safari mobile */
            overscroll-behavior-y: contain; 
            overscroll-behavior: none;
        }
        /* Header Layout Styles */
        .brand-header {
            margin-bottom: 30px;
        }
        .main-title {
            font-size: 3rem;
            margin: 0;
            color: #ff4757;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 71, 87, 0.3);
        }
        .sub-title {
            font-size: 1.2rem;
            margin: 5px 0 0 0;
            color: #a4b0be;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        /* Card Styles */
        .card { 
            background: #2a2a2a; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            display: inline-block; 
            max-width: 500px;
            width: 100%;
            border: 3px solid #ff5957; /* Accent border color */
            box-sizing: border-box;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; color: #f1f2f6; }
        .price { 
            font-size: clamp(1.8rem, 7vw, 2.8rem); /* Adjusted font size dynamically to fit longer item names */
            color: #ff4757; /* Price text color */
            font-weight: bold; 
            margin: 30px 0;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
            word-wrap: break-word;
            text-transform: uppercase;
        }
        .subtext { color: #a4b0be; font-size: 0.9rem; margin-bottom: 15px; }
        
        /* Thank You Message Style */
        .thank-you-msg {
            font-size: 1.1rem;
            color: #2ed573; /* Smooth green color */
            font-weight: 600;
            margin-top: 15px;
            border-top: 1px solid #444;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <h1 class="main-title">GLAMOUR</h1>
        <p class="sub-title">Exclusive Rewards Portal</p>
    </div>

    <div class="card">
        <h1>🎉CONGRATULATIONS🎉</h1>
        <div class="price" id="price-tag">Scanning...</div>
        <div class="subtext" id="subtext-hint">Warning: Refreshing is disabled for this offer!</div>
        
        <div class="thank-you-msg" id="thank-you">Thank you for being a valued customer!</div>
    </div>

    <script>
        // --- CUSTOMIZE YOUR GIFTS & PRIORITY HERE ---
        const giftPool = [
            { prize: "MAGIC LED BULB", weight: 30 }, 
            { prize: "WATER BOTTLE",   weight: 25 }, 
            { prize: "COFFEE MUG",    weight:  15 }, 
            { prize: "CUP SET",        weight:  15 }, 
            { prize: "TRAY",          weight:   8 }, 
            { prize: "LADIES BAG",     weight: 15 }, 
            { prize: "UMBRELLA",       weight: 10 }, 
            { prize: "GENTS BAG",      weight: 8  }, 
            { prize: "WALL CLOCK",     weight: 6  }, 
            { prize: "WRIST WATCH",    weight: 5  }, 
            { prize: "FAN",            weight: 0  }  
        ];

        // --- THE ENGINE ---
        function getWeightedGift(pool) {
            const totalWeight = pool.reduce((sum, gift) => sum + gift.weight, 0);
            let randomNum = Math.random() * totalWeight;
            
            for (const gift of pool) {
                if (randomNum < gift.weight) {
                    return gift.prize;
                }
                randomNum -= gift.weight;
            }
            return pool[0].prize; 
        }

        // --- MOBILE-PROOF STORAGE TRACKER ---
        // Looks inside the hidden device memory to see if they already loaded a prize earlier
        let finalPrize = localStorage.getItem("glamour_gift_lock");

        if (!finalPrize) {
            // First time loading: Roll a prize and lock it permanently inside their phone
            finalPrize = getWeightedGift(giftPool);
            localStorage.setItem("glamour_gift_lock", finalPrize);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const priceTag = document.getElementById("price-tag");
            const thankYouBox = document.getElementById("thank-you");
            
            priceTag.textContent = finalPrize;
            thankYouBox.textContent = "Thank you for being a valued customer! Enjoy your gift.";
            
            // Push a fake state entry into browser history to trap navigation actions
            window.history.pushState(null, null, window.location.href);
        });

        // Intercepts Back/Forward/Refresh browser actions 
        window.history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', () => {
            window.history.pushState(null, null, window.location.href);
        });

        // --- ANTI-REFRESH ENGINE (PC & MOBILE) ---
        window.addEventListener('beforeunload', (event) => {
            event.preventDefault();
            event.returnValue = 'Your prize is locked.'; 
        });

        // Strict lock for Keyboard Refresh commands
        window.addEventListener('keydown', (event) => {
            const isRKey = event.key.toLowerCase() === 'r' || event.code === 'KeyR';
            if (
                event.key === 'F5' || 
                event.key === 'Refresh' ||
                (event.ctrlKey && isRKey) || 
                (event.metaKey && isRKey)
            ) {
                event.preventDefault();
                alert("Refresh Action Prevented! Please process your current reward.");
            }
        });

        // Mobile touch gesture interceptor
        let touchStartPosition = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartPosition = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            const touchMovePosition = e.touches[0].clientY;
            if (window.scrollY === 0 && touchMovePosition > touchStartPosition) {
                e.preventDefault(); 
            }
        }, { passive: false });
    </script>

</body>
</html>
