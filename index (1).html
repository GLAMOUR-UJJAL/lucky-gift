<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Lucky Gift!</title>
    <style>
        /* CUSTOMIZE YOUR LOOK HERE */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #1a1a1a; /* Dark sleek background */
            color: #fff;
            padding: 50px 20px; 
        }
        .card { 
            background: #2a2a2a; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            display: inline-block; 
            max-width: 400px;
            width: 100%;
            border: 2px solid #ff4757; /* Accent border color */
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; color: #f1f2f6; }
        .price { 
            font-size: 3.5rem; 
            color: #ff4757; /* Price text color */
            font-weight: bold; 
            margin: 30px 0;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }
        .subtext { color: #a4b0be; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 Your Special Price 🎉</h1>
        <div class="price" id="price-tag">Scanning...</div>
        <div class="subtext">Show this screen to claim your offer!</div>
    </div>

    <script>
        // --- CUSTOMIZE YOUR GIFTS & PRIORITY HERE ---
        // Change the 'weight' numbers below to adjust the winning probabilities.
        // Currently configured to sum up to 137 (percentage chance).
        const giftPool = [
            { prize: "MAGIC LED BULB", weight: 30 }, // 30% Chance
            { prize: "WATER BOTTLE",   weight: 25 }, // 25% Chance
            { prize: "COFFEE MUG",    weight:  15 }, // 15% Chance
            { prize: "CUP SET",       weight:  15 }, // 15% Chance   
            { prize: "TRAY",          weight:   8 }, // 8% Chance
            { prize: "LADIES BAG",     weight: 15 }, // 15% Chance
            { prize: "UMBRELLA",       weight: 10 }, // 10% Chance
            { prize: "GENTS BAG",      weight: 8  }, //  8% Chance
            { prize: "WALL CLOCK",     weight: 6  }, //  6% Chance
            { prize: "WRIST WATCH",    weight: 5  }, //  5% Chance
            { prize: "FAN",            weight: 0  }  //  0% Chance (Grand Prize rarity)
        ];

        // --- THE ENGINE (Do not change this part) ---
        function getWeightedGift(pool) {
            let totalWeight = pool.reduce((sum, gift) => sum + gift.weight, 0);
            let randomNum = Math.random() * totalWeight;
            
            for (let i = 0; i < pool.length; i++) {
                if (randomNum < pool[i].weight) {
                    return pool[i].prize;
                }
                randomNum -= pool[i].weight;
            }
        }

        // Run the script on page load
        document.getElementById("price-tag").innerText = getWeightedGift(giftPool);
    </script>

</body>
</html>
