<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Lucky Gift!</title>
    <style>
        /* CUSTOMIZE YOUR LOOK HERE */
        html, body {
            overflow: hidden; /* Hard block on mobile pull-to-refresh scrolling */
            height: 100%;
            margin: 0;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #1a1a1a; /* Dark sleek background */
            color: #fff;
            padding: 50px 20px; 
            /* Prevents pull-to-refresh gesture on chrome/safari mobile */
            overscroll-behavior-y: contain; 
            overscroll-behavior: none;
        }
        /* Header Layout Styles */
        .brand-header {
            margin-bottom: 30px;
        }
        .main-title {
            font-size: 3rem;
            margin: 0;
            color: #ff4757;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 71, 87, 0.3);
        }
        .sub-title {
            font-size: 1.2rem;
            margin: 5px 0 0 0;
            color: #a4b0be;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        /* Card Styles */
        .card { 
            background: #2a2a2a; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            display: inline-block; 
            max-width: 500px;
            width: 100%;
            border: 3px solid #ff5957; /* Accent border color */
            box-sizing: border-box;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; color: #f1f2f6; }
        .price { 
            font-size: clamp(1.8rem, 7vw, 2.8rem); /* Adjusted font size dynamically to fit longer item names */
            color: #ff4757; /* Price text color */
            font-weight: bold; 
            margin: 30px 0;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
            word-wrap: break-word;
            text-transform: uppercase;
        }
        .subtext { color: #a4b0be; font-size: 0.9rem; margin-bottom: 15px; }
         
        /* New Reveal Button Styles */
        .reveal-btn {
            background: #ff4757;
            color: #fff;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            margin: 20px 0;
        }
        .reveal-btn:hover {
            background: #ff6b81;
        }
        .reveal-btn:active {
            transform: scale(0.95);
        }
        .reveal-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            display: none; /* Hide button once clicked */
        }

        /* Re-reveal Button Style */
        .re-reveal-btn {
            background: #ffa502;
            color: #fff;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 165, 2, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            margin: 15px 0 0 0;
            display: none; /* Hidden until a gift is active */
        }
        .re-reveal-btn:hover {
            background: #ff793f;
        }
        .re-reveal-btn:active {
            transform: scale(0.95);
        }

        /* Thank You Message Style */
        .thank-you-msg {
            font-size: 1.1rem;
            color: #2ed573; /* Smooth green color */
            font-weight: 600;
            margin-top: 15px;
            border-top: 1px solid #444;
            padding-top: 15px;
            display: none; /* Hidden by default until button is clicked */
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <h1 class="main-title">GLAMOUR</h1>
        <p class="sub-title">Exclusive Rewards Portal</p>
    </div>

    <div class="card">
        <h1>🎉CONGRATULATIONS🎉</h1>
        <div class="price" id="price-tag">🎁 Ready...</div>
        <div class="subtext" id="subtext-hint">Warning: Refreshing is disabled for this offer!</div>
         
        <!-- REVEAL BUTTON -->
        <button class="reveal-btn" id="reveal-button">Reveal Gift</button>

        <!-- RE-REVEAL BUTTON -->
        <button class="re-reveal-btn" id="re-reveal-button">Reveal Another Gift</button>
         
        <div class="thank-you-msg" id="thank-you">Thank you for being a valued customer!</div>
    </div>

    <script>
        // --- CUSTOMIZE YOUR GIFTS & PRIORITY HERE ---
        const giftPool = [
            { prize: "MAGIC LED BULB", weight: 30 }, 
            { prize: "WATER BOTTLE",   weight: 25 }, 
            { prize: "COFFEE MUG",    weight:  15 }, 
            { prize: "CUP SET",        weight:  15 }, 
            { prize: "TRAY",          weight:   8 }, 
            { prize: "LADIES BAG",     weight: 15 }, 
            { prize: "UMBRELLA",       weight: 10 }, 
            { prize: "GENTS BAG",      weight: 8  }, 
            { prize: "WALL CLOCK",     weight: 6  }, 
            { prize: "WRIST WATCH",    weight: 5  }, 
            { prize: "FAN",            weight: 0  }  
        ];

        // --- THE ENGINE ---
        function getWeightedGift(pool) {
            const totalWeight = pool.reduce((sum, gift) => sum + gift.weight, 0);
            let randomNum = Math.random() * totalWeight;
             
            for (const gift of pool) {
                if (randomNum < gift.weight) {
                    return gift.prize;
                }
                randomNum -= gift.weight;
            }
            return pool[0].prize; 
        }

        // --- DEVICE MEMORY TRACKER ---
        const priceTag = document.getElementById("price-tag");
        const revealBtn = document.getElementById("reveal-button");
        const reRevealBtn = document.getElementById("re-reveal-button");
        const thankYouBox = document.getElementById("thank-you");

        // Check if a prize was already claimed or generated for this device
        let savedPrize = localStorage.getItem("glamour_gift_lock");

        window.addEventListener('DOMContentLoaded', () => {
            if (savedPrize) {
                // User already opened it before! Instantly show it and remove the button
                showPrize(savedPrize);
            } else {
                // New session, wait for button interaction
                revealBtn.addEventListener('click', () => {
                    const finalPrize = getWeightedGift(giftPool);
                    localStorage.setItem("glamour_gift_lock", finalPrize);
                    showPrize(finalPrize);
                });
            }
             
            // Re-reveal button setup to wipe storage and reset the screen cleanly
            reRevealBtn.addEventListener('click', () => {
                localStorage.removeItem("glamour_gift_lock");
                priceTag.textContent = "🎁 Ready...";
                revealBtn.disabled = false;
                revealBtn.style.display = "inline-block";
                thankYouBox.style.display = "none";
                reRevealBtn.style.display = "none";
                
                // Instantly re-trigger clean event bindings for next generation
                location.reload();
            });

            // Push history entries to safeguard navigation resets
            window.history.pushState(null, null, window.location.href);
        });

        function showPrize(prize) {
            priceTag.textContent = prize;
            revealBtn.disabled = true;
            thankYouBox.style.display = "block";
            thankYouBox.textContent = "Thank you for being a valued customer! Enjoy your gift.";
            reRevealBtn.style.display = "inline-block"; // Safely shows the action handler element
        }

        // Intercept navigation loops 
        window.history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', () => {
            window.history.pushState(null, null, window.location.href);
        });

        // --- ANTI-REFRESH INTERCEPTORS ---
        window.addEventListener('beforeunload', (event) => {
            event.preventDefault();
            event.returnValue = ''; 
        });

        // Strict lock for Keyboard Refresh commands
        window.addEventListener('keydown', (event) => {
            const isRKey = event.key.toLowerCase() === 'r' || event.code === 'KeyR';
            if (
                event.key === 'F5' || 
                event.key === 'Refresh' ||
                (event.ctrlKey && isRKey) || 
                (event.metaKey && isRKey)
            ) {
                event.preventDefault();
                alert("Refresh Action Prevented! Please view your reward.");
            }
        });

        // Mobile touch gesture interceptor to destroy native pull-to-refresh pull downs
        let touchStartPosition = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartPosition = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            const touchMovePosition = e.touches[0].clientY;
            if (window.scrollY === 0 && touchMovePosition > touchStartPosition) {
                e.preventDefault(); 
            }
        }, { passive: false });
    </script>

</body>
</html>
